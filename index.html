<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warrior Cats: Legacy of the Clans</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="menu">

<h1>🐈 Warrior Cats</h1>

<p>Legacy of the Clans</p>

<button class="green" onclick="startGame()">
New Game
</button>

<br>

<button class="gray">
Continue
</button>

<br>

<button class="gray">
Settings
</button>

</div>

<div class="creator">

<h1>Create Your Cat</h1>

<label>Name</label>

<input
type="text"
id="catName"
placeholder="Enter your cat's name">

<label>Gender</label>

<select id="gender">

<option>Tom</option>

<option>She-cat</option>

<option>Other</option>

</select>
<label>Clan</label>

<select id="clan">

<option>ThunderClan</option>
<option>RiverClan</option>
<option>WindClan</option>
<option>ShadowClan</option>
<option>SkyClan</option>
<option>Loner</option>
<option>Rogue</option>
<option>Kittypet</option>

</select>

<label>Fur Color</label>

<select id="fur">

<option>Black</option>
<option>White</option>
<option>Gray</option>
<option>Dark Gray</option>
<option>Brown</option>
<option>Chocolate</option>
<option>Ginger</option>
<option>Cream</option>
<option>Golden</option>

</select>

<label>Eye Color</label>

<select id="eyeColor">

<option>Green</option>
<option>Blue</option>
<option>Amber</option>
<option>Yellow</option>
<option>Gray</option>

</select>

<div class="preview">

🐈

</div>

<p class="info">

Live Cat Preview (coming soon!)

</p>

<button class="green" onclick="createCat()">

Create Cat

</button>

</div>
<script src="game.js"></script>

</body>
</html>
