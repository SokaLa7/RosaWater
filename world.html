<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warriors: Lost Prophecy</title>

<style>

html,body{

margin:0;
overflow:hidden;
width:100%;
height:100%;

}

canvas{

display:block;

}

</style>
<body>

<div id="joystickBase">
    <div id="joystickStick"></div>
</div>

<style>

body{
margin:0;
overflow:hidden;
}

#joystickBase{

position:fixed;

left:30px;

bottom:30px;

width:130px;

height:130px;

border-radius:50%;

background:rgba(255,255,255,.18);

border:2px solid rgba(255,255,255,.35);

touch-action:none;

z-index:100;

}

#joystickStick{

position:absolute;

left:40px;

top:40px;

width:50px;

height:50px;

border-radius:50%;

background:white;

opacity:.85;

}
#scentBox{
    position:absolute;
    top:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    color:white;
    font-family:Georgia, serif;
    text-shadow:0 2px 6px rgba(0,0,0,.75);
    z-index:200;
    user-select:none;
}

#scentTitle{
    font-size:18px;
    letter-spacing:.5px;
}

#scentList{
    margin-top:6px;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:4px;
}

.scentItem{
    font-size:15px;
    opacity:.9;
}
</style>
<div id="scentBox">
    <div id="scentTitle">Scent</div>
    <div id="scentList"></div>
</div>
<script type="module" src="world.js"></script>

</body>

</html>
